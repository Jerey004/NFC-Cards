<!DOCTYPE html>
<html lang="en" id="root" class="dk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NFC Cards">

<title>NFC Cards</title>

<style>
:root{
  --gold:#c8a020;
  --gold-h:#e0b830;
  --red:#8b1a1a;
  --ink:#1a0f00;
  --parchment:#f0e6c8;
  --parchment-dark:#d9c99a;

  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);

  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  --font-card:Georgia,"Times New Roman",serif;
}

.dk{
  --bg:#111;
  --bg2:#0a0a0a;
  --panel:#1c1c1e;
  --border:#2c2c2e;
  --border2:#3a3a3c;
  --text:#f2f2f7;
  --tmid:#aeaeb2;
  --tdim:#636366;
  --togbg:#0a0a0a;
  --togact:#2a1d00;
  --inbg:#0a0a0a;
  --incol:#f0e6c8;
}

.lt{
  --bg:#f2f2f7;
  --bg2:#fff;
  --panel:#fff;
  --border:#d1d1d6;
  --border2:#c7c7cc;
  --text:#1c1c1e;
  --tmid:#3a3a3c;
  --tdim:#8e8e93;
  --togbg:#f2f2f7;
  --togact:#fff8e8;
  --inbg:#fff;
  --incol:#1c1c1e;
}

*,
*::before,
*::after{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html,body{
  height:100%;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  font-size:15px;
  line-height:1.4;
  transition:background .2s,color .2s;
}

.app{
  display:flex;
  flex-direction:column;
  min-height:100dvh;
}

.topbar{
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:calc(var(--safe-top) + 10px) 16px 10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;
  top:0;
  z-index:100;
}

.topbar-title{
  font-size:15px;
  font-weight:700;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:var(--gold);
}

.topbar-sub{
  font-size:11px;
  color:var(--tdim);
}

.topbar-right{
  display:flex;
  align-items:center;
  gap:8px;
}

.theme-btn{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:20px;
  padding:5px 12px;
  color:var(--tmid);
  cursor:pointer;
}

.content{
  flex:1;
  padding:16px;
}

.panel{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:12px;
  padding:16px;
  margin-bottom:12px;
}

.ptitle{
  font-size:11px;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--gold);
  margin-bottom:12px;
}

.field{
  margin-bottom:12px;
}

.field label{
  display:block;
  margin-bottom:4px;
  font-size:11px;
  text-transform:uppercase;
  color:var(--tdim);
}

input[type=text],
textarea{
  width:100%;
  background:var(--inbg);
  color:var(--incol);
  border:1px solid var(--border);
  border-radius:8px;
  padding:10px 12px;
  font-size:16px;
}

textarea{
  min-height:90px;
  resize:vertical;
}

.tg{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.tog{
  background:var(--togbg);
  border:1px solid var(--border);
  border-radius:8px;
  padding:10px;
  cursor:pointer;
  color:var(--tdim);
}

.tog.on{
  border-color:var(--gold);
  color:var(--gold);
  background:var(--togact);
}

.brow{
  display:flex;
  gap:8px;
  margin-top:12px;
}

.btn{
  flex:1;
  border:none;
  border-radius:10px;
  padding:13px;
  cursor:pointer;
  font-weight:700;
}

.bg{
  background:var(--gold);
  color:#1a0f00;
}

.bo{
  background:transparent;
  border:1px solid var(--border2);
  color:var(--tmid);
}

#pc{
  display:flex;
  justify-content:center;
}

.card{
  position:relative;
  overflow:hidden;
  background:var(--card-bg,var(--parchment));
  border:3px double #7a6030;
  font-family:var(--font-card);
  display:flex;
  flex-direction:column;
}

.ctb,
.cbb{
  height:10px;
  background:repeating-linear-gradient(
    90deg,
    var(--ink) 0,
    var(--ink) 4px,
    transparent 4px,
    transparent 8px
  );
  opacity:.15;
}

.ch{
  padding:.45rem .75rem .3rem;
  text-align:center;
}

.cera{
  font-size:.38rem;
  letter-spacing:.3em;
  text-transform:uppercase;
  color:var(--red);
}

.cname{
  font-weight:700;
  font-size:.95rem;
  color:var(--ink);
}

.cdates{
  font-style:italic;
  font-size:.42rem;
  color:#7a6030;
}

.cdiv{
  display:flex;
  align-items:center;
  gap:.3rem;
  padding:0 .75rem;
  margin:.15rem 0;
}

.cdiv::before,
.cdiv::after{
  content:'';
  flex:1;
  height:1px;
  background:var(--ink);
  opacity:.3;
}

.corn{
  color:#b8941f;
}

.cia{
  position:relative;
  margin:0 .75rem .3rem;
  flex:1;
  background:var(--parchment-dark);
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}

.cia img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:top center;
}

.cia img.sk-none{
  filter:sepia(.4) contrast(1.1);
}

.cia img.sk-woodcut{
  filter:grayscale(1) contrast(2.4) brightness(1.1) sepia(.15);
}

.cia img.sk-etching{
  filter:grayscale(1) contrast(3) brightness(1.25);
}

.cia img.sk-pencil{
  filter:grayscale(1) contrast(1.6) brightness(1.35);
}

.cia img.sk-litho{
  filter:grayscale(1) contrast(2.8) brightness(.95) sepia(.08);
}

.crole{
  padding:0 .75rem;
  text-align:center;
  font-style:italic;
  font-size:.44rem;
  color:#5a4020;
}

.cbody{
  padding:.3rem .75rem .25rem;
}

.cquote{
  font-style:italic;
  font-size:.44rem;
  line-height:1.5;
  color:#2a1800;
  border-left:2px solid #b8941f;
  padding-left:.4rem;
}

.cfoot{
  padding:.2rem .75rem .3rem;
  display:flex;
  justify-content:space-between;
}

.cnat{
  font-size:.32rem;
  text-transform:uppercase;
  color:rgba(0,0,0,.35);
}

.cser{
  font-size:.32rem;
  color:#b8941f;
}

.card::before{
  content:'';
  position:absolute;
  inset:0;
  pointer-events:none;
  opacity:.2;
}

@media(min-width:768px){

  .content{
    max-width:900px;
    margin:0 auto;
    width:100%;
  }

}
</style>
</head>

<body>

<div class="app">

  <div class="topbar">
    <div>
      <div class="topbar-title">NFC Cards</div>
      <div class="topbar-sub">Digital Graffiti Project</div>
    </div>

    <div class="topbar-right">
      <button class="theme-btn" onclick="toggleTheme()">
        <span id="ticon">☀️</span>
        <span id="tlabel">Light</span>
      </button>
    </div>
  </div>

  <div class="content">

    <div class="panel">

      <div class="ptitle">Card Details</div>

      <div class="field">
        <label>Full Name</label>
        <input type="text" id="nm" value="Frederick Douglass" oninput="updatePreview()">
      </div>

      <div class="field">
        <label>Birth – Death Years</label>
        <input type="text" id="dt" value="1818 – 1895" oninput="updatePreview()">
      </div>

      <div class="field">
        <label>Title / Role</label>
        <input type="text" id="ro" value="Abolitionist · Author · Statesman" oninput="updatePreview()">
      </div>

      <div class="field">
        <label>Nationality</label>
        <input type="text" id="na" value="American" oninput="updatePreview()">
      </div>

      <div class="field">
        <label>Era</label>
        <input type="text" id="er" value="Antebellum America" oninput="updatePreview()">
      </div>

      <div class="field">
        <label>Quote</label>
        <textarea id="qu" oninput="updatePreview()">"Once you learn to read, you will be forever free."</textarea>
      </div>

      <div class="field">
        <label>Series</label>
        <input type="text" id="se" value="Voices of Dissent · Vol. I" oninput="updatePreview()">
      </div>

      <div class="field">
        <label>Portrait Image URL</label>
        <input
          type="text"
          id="im"
          value="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Frederick_Douglass_%28circa_1879%29.jpg/440px-Frederick_Douglass_%28circa_1879%29.jpg"
          oninput="updatePreview()">
      </div>

    </div>

    <div class="panel">

      <div class="ptitle">Portrait Effect</div>

      <div class="tg">
        <button class="tog sk-tog" data-v="none" onclick="setSketch('none')">Photo</button>
        <button class="tog sk-tog on" data-v="woodcut" onclick="setSketch('woodcut')">Woodcut</button>
        <button class="tog sk-tog" data-v="etching" onclick="setSketch('etching')">Etching</button>
        <button class="tog sk-tog" data-v="pencil" onclick="setSketch('pencil')">Pencil</button>
      </div>

    </div>

    <div class="panel">

      <div class="ptitle">Live Preview</div>

      <div id="pc"></div>

    </div>

  </div>

</div>

<script>
let dark = true;
let cSketch = 'woodcut';

function esc(s){
  return String(s || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function toggleTheme(){

  dark = !dark;

  const root = document.getElementById('root');

  root.className = dark ? 'dk' : 'lt';

  document.getElementById('ticon').textContent =
    dark ? '☀️' : '🌙';

  document.getElementById('tlabel').textContent =
    dark ? 'Light' : 'Dark';
}

function setSketch(v){

  cSketch = v;

  document.querySelectorAll('.sk-tog').forEach(btn => {
    btn.classList.toggle(
      'on',
      btn.dataset.v === v
    );
  });

  updatePreview();
}

function getVal(id){
  const el = document.getElementById(id);
  return el ? el.value : '';
}

function getData(){

  return {
    name:getVal('nm'),
    dates:getVal('dt'),
    role:getVal('ro'),
    nation:getVal('na'),
    era:getVal('er'),
    quote:getVal('qu'),
    series:getVal('se'),
    img:getVal('im')
  };
}

function buildCard(d){

  const img = d.img
    ? `
      <img
        src="${esc(d.img)}"
        class="sk-${esc(cSketch)}"
        onerror="this.style.display='none'">
    `
    : `
      <div style="opacity:.35;">No Image</div>
    `;

  return `
    <div class="card">

      <div class="ctb"></div>

      <div class="ch">
        <div class="cera">${esc(d.era)}</div>
        <div class="cname">${esc(d.name)}</div>
        <div class="cdates">${esc(d.dates)}</div>
      </div>

      <div class="cdiv">
        <span class="corn">✦</span>
      </div>

      <div class="cia">
        ${img}
      </div>

      <div class="crole">
        ${esc(d.role)}
      </div>

      <div class="cbody">
        <div class="cquote">
          ${esc(d.quote)}
        </div>
      </div>

      <div class="cfoot">
        <div class="cnat">${esc(d.nation)}</div>
        <div class="cser">${esc(d.series)}</div>
      </div>

      <div class="cbb"></div>

    </div>
  `;
}

function updatePreview(){

  const d = getData();

  const html = buildCard(d);

  const pc = document.getElementById('pc');

  pc.innerHTML = html;

  const card = pc.querySelector('.card');

  if(card){

    card.style.width = '320px';
    card.style.height = '420px';
    card.style.boxShadow = '0 6px 32px rgba(0,0,0,.4)';
  }
}

toggleTheme();
toggleTheme();

updatePreview();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en" id="root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NFC Cards">

<title>NFC Cards</title>

<style>
:root{
  --gold:#c8a020;
  --gold-h:#e0b830;
  --red:#8b1a1a;
  --ink:#1a0f00;
  --parchment:#f0e6c8;
  --parchment-dark:#d9c99a;

  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);

  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  --font-card:Georgia,"Times New Roman",serif;
}

.dk{
  --bg:#111;
  --bg2:#0a0a0a;
  --panel:#1c1c1e;
  --border:#2c2c2e;
  --border2:#3a3a3c;
  --text:#f2f2f7;
  --tmid:#aeaeb2;
  --tdim:#636366;
  --togbg:#0a0a0a;
  --togact:#2a1d00;
  --inbg:#0a0a0a;
  --incol:#f0e6c8;
}

.lt{
  --bg:#f2f2f7;
  --bg2:#fff;
  --panel:#fff;
  --border:#d1d1d6;
  --border2:#c7c7cc;
  --text:#1c1c1e;
  --tmid:#3a3a3c;
  --tdim:#8e8e93;
  --togbg:#f2f2f7;
  --togact:#fff8e8;
  --inbg:#fff;
  --incol:#1c1c1e;
}

*,*::before,*::after{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html,body{
  height:100%;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  font-size:15px;
  line-height:1.4;
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior:none;
  transition:background .2s,color .2s;
}

.app{
  display:flex;
  flex-direction:column;
  min-height:100dvh;
}

.topbar{
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:calc(var(--safe-top) + 10px) 16px 10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;
  top:0;
  z-index:100;
}

.topbar-title{
  font-size:15px;
  font-weight:700;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:var(--gold);
}

.topbar-sub{
  font-size:11px;
  color:var(--tdim);
  margin-top:1px;
}

.topbar-right{
  display:flex;
  align-items:center;
  gap:8px;
}

.theme-btn{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:20px;
  padding:5px 12px;
  font-size:13px;
  color:var(--tmid);
  cursor:pointer;
}

.tab-bar{
  display:flex;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
}

.tab-btn{
  flex:1;
  padding:10px;
  background:none;
  border:none;
  color:var(--tdim);
  cursor:pointer;
}

.tab-btn.on{
  color:var(--gold);
  border-bottom:2px solid var(--gold);
}

.content{
  flex:1;
  overflow-y:auto;
  padding-bottom:calc(16px + var(--safe-bottom));
}

.tab-panel{
  display:none;
  padding:16px;
}

.tab-panel.on{
  display:block;
}

.panel{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:12px;
  padding:16px;
  margin-bottom:12px;
}

.ptitle{
  font-size:11px;
  font-weight:600;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--gold);
  margin-bottom:14px;
  padding-bottom:10px;
  border-bottom:1px solid var(--border);
}

.field{
  margin-bottom:12px;
}

.field label{
  display:block;
  font-size:11px;
  text-transform:uppercase;
  color:var(--tdim);
  margin-bottom:5px;
}

input[type=text],
textarea{
  width:100%;
  background:var(--inbg);
  border:1px solid var(--border);
  color:var(--incol);
  font-family:var(--font);
  font-size:16px;
  padding:10px 12px;
  border-radius:8px;
  outline:none;
}

textarea{
  min-height:80px;
  resize:vertical;
}

input[type=text]:focus,
textarea:focus{
  border-color:var(--gold);
}

.tg{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.tog{
  background:var(--togbg);
  border:1px solid var(--border);
  color:var(--tdim);
  padding:10px 6px;
  cursor:pointer;
  border-radius:8px;
  text-align:center;
}

.tog.on{
  border-color:var(--gold);
  color:var(--gold);
  background:var(--togact);
}

.brow{
  display:flex;
  gap:8px;
  margin-top:12px;
}

.btn{
  flex:1;
  padding:13px 10px;
  border:none;
  cursor:pointer;
  border-radius:10px;
  min-height:48px;
}

.bg{
  background:var(--gold);
  color:#1a0f00;
}

.bo{
  background:transparent;
  border:1px solid var(--border2);
  color:var(--tmid);
}

.bd{
  background:transparent;
  border:1px solid #4a2020;
  color:#aa5555;
}

.hint{
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:8px;
  padding:10px 12px;
  font-size:12px;
  color:var(--tdim);
  line-height:1.6;
  margin-top:10px;
}

#pc,#dpc{
  display:flex;
  justify-content:center;
}

.card{
  position:relative;
  overflow:hidden;
  background:var(--card-bg,var(--parchment));
  display:flex;
  flex-direction:column;
  font-family:var(--font-card);
}

.card.sb{
  background:var(--card-bg,#f5e8c0);
  border:3px double #7a6030;
}

.card.sp{
  background:var(--card-bg,#e8d5b0);
  border:4px solid var(--red);
}

.card.ss{
  background:var(--card-bg,#f0e8d0);
  border:2px solid #5a4020;
}

.card.sm{
  background:var(--card-bg,#e0d8c8);
  border:2px solid #666;
}

.ch{
  padding:.45rem .75rem .3rem;
  text-align:center;
}

.cera{
  font-size:.38rem;
  letter-spacing:.3em;
  text-transform:uppercase;
  color:var(--red);
}

.cname{
  font-weight:700;
  font-size:.95rem;
  line-height:1.15;
  color:var(--ink);
}

.cdates{
  font-style:italic;
  font-size:.42rem;
  color:#7a6030;
  margin-top:.06rem;
}

.cia{
  margin:0 .75rem .3rem;
  flex:1 1 auto;
  background:var(--parchment-dark);
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.cia img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.crole{
  padding:0 .75rem;
  text-align:center;
  font-style:italic;
  font-size:.44rem;
  color:#5a4020;
}

.cbody{
  padding:.3rem .75rem .25rem;
}

.cquote{
  font-style:italic;
  font-size:.44rem;
  line-height:1.5;
  color:#2a1800;
}

.cfoot{
  padding:.2rem .75rem .3rem;
  display:flex;
  justify-content:space-between;
}

.cnat{
  font-size:.32rem;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:rgba(0,0,0,.35);
}

.cser{
  font-size:.32rem;
  color:#b8941f;
}

.card::before{
  content:'';
  position:absolute;
  inset:0;
  pointer-events:none;
  opacity:.12;
}

@media(min-width:768px){

  .app{
    display:block;
  }

  .tab-bar,
  .content{
    display:none !important;
  }

  #desklay{
    display:grid !important;
    grid-template-columns:400px 1fr;
    gap:24px;
    padding:20px 24px 32px;
    max-width:1200px;
    margin:0 auto;
  }

  #dpb{
    display:block !important;
  }
}
</style>
</head>

<body>

<div class="app">

<div class="topbar">
  <div>
    <div class="topbar-title">NFC Cards</div>
    <div class="topbar-sub">Digital Graffiti Project</div>
  </div>

  <div class="topbar-right">
    <button class="theme-btn" onclick="toggleTheme()">
      <span id="ticon">☀️</span>
      <span id="tlabel">Light</span>
    </button>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn on" onclick="goTab('edit')">Edit</button>
  <button class="tab-btn" onclick="goTab('preview')">Preview</button>
</div>

<div class="content">

<div class="tab-panel on" id="tp-edit">

<div class="panel">

<div class="ptitle">Card Details</div>

<div class="field">
<label>Full Name</label>
<input type="text" id="mnm" value="Frederick Douglass" oninput="updatePreview()">
</div>

<div class="field">
<label>Birth – Death Years</label>
<input type="text" id="mdt" value="1818 – 1895" oninput="updatePreview()">
</div>

<div class="field">
<label>Role</label>
<input type="text" id="mro" value="Abolitionist · Author · Statesman" oninput="updatePreview()">
</div>

<div class="field">
<label>Nationality</label>
<input type="text" id="mna" value="American" oninput="updatePreview()">
</div>

<div class="field">
<label>Era</label>
<input type="text" id="mer" value="Antebellum America" oninput="updatePreview()">
</div>

<div class="field">
<label>Quote</label>
<textarea id="mqu" oninput="updatePreview()">Once you learn to read, you will be forever free.</textarea>
</div>

<div class="field">
<label>Series</label>
<input type="text" id="mse" value="Voices of Dissent · Vol. I" oninput="updatePreview()">
</div>

<div class="field">
<label>Portrait URL</label>
<input type="text"
id="mim"
value="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Frederick_Douglass_%28circa_1879%29.jpg/440px-Frederick_Douglass_%28circa_1879%29.jpg"
oninput="updatePreview()">
</div>

</div>

<div class="brow">
<button class="btn bg" onclick="saveCard()">Add To Sheet</button>
<button class="btn bo" onclick="goTab('preview')">Preview</button>
</div>

</div>

<div class="tab-panel" id="tp-preview">

<div class="panel">
<div id="pc"></div>
</div>

</div>

</div>
</div>

<script>
let cards = [];

let cStyle = 'broadside';
let dark = true;
let cardBg = '';

function esc(s){
  return String(s || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function setTheme(d){

  dark = d;

  const root = document.getElementById('root');

  root.className = dark ? 'dk' : 'lt';

  document.getElementById('ticon').textContent =
    dark ? '☀️' : '🌙';

  document.getElementById('tlabel').textContent =
    dark ? 'Light' : 'Dark';
}

function toggleTheme(){
  setTheme(!dark);
}

function goTab(id){

  document.querySelectorAll('.tab-panel')
    .forEach(p => p.classList.remove('on'));

  document.querySelectorAll('.tab-btn')
    .forEach(b => b.classList.remove('on'));

  document.getElementById('tp-' + id)
    .classList.add('on');

  event.target.classList.add('on');
}

function getVal(id){
  const el = document.getElementById(id);
  return el ? el.value : '';
}

function getData(){

  return{
    name:getVal('mnm'),
    dates:getVal('mdt'),
    role:getVal('mro'),
    nation:getVal('mna'),
    era:getVal('mer'),
    quote:getVal('mqu'),
    series:getVal('mse'),
    img:getVal('mim')
  };
}

function buildCard(d){

  return `
    <div class="card sb">

      <div class="ch">
        <div class="cera">${esc(d.era)}</div>

        <div class="cname">
          ${esc(d.name)}
        </div>

        <div class="cdates">
          ${esc(d.dates)}
        </div>
      </div>

      <div class="cia">
        ${
          d.img
          ? `<img src="${esc(d.img)}">`
          : ''
        }
      </div>

      <div class="crole">
        ${esc(d.role)}
      </div>

      <div class="cbody">
        <div class="cquote">
          "${esc(d.quote)}"
        </div>
      </div>

      <div class="cfoot">
        <div class="cnat">
          ${esc(d.nation)}
        </div>

        <div class="cser">
          ${esc(d.series)}
        </div>
      </div>

    </div>
  `;
}

function updatePreview(){

  const data = getData();

  const w = document.getElementById('pc');

  w.innerHTML = buildCard(data);

  const c = w.querySelector('.card');

  if(c){

    c.style.width = '320px';
    c.style.height = '420px';

    c.style.boxShadow =
      '0 6px 32px rgba(0,0,0,.5)';

    c.style.margin = '0 auto';

    if(cardBg){
      c.style.setProperty('--card-bg',cardBg);
    }
  }
}

function saveCard(){

  const d = getData();

  cards.push(d);

  alert('Card added to sheet.');
}

setTheme(true);
updatePreview();
</script>

</body>
</html>

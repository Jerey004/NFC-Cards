<!--
NFC Cards Generator
Cleaned + Fixed Version
Restored original options/features
-->

<!DOCTYPE html>
<html lang="en" id="root" class="dk">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>NFC Cards</title>

<style>

:root{
  --gold:#c8a020;
  --gold-h:#e0b830;
  --red:#8b1a1a;
  --ink:#1a0f00;

  --parchment:#f0e6c8;
  --parchment-dark:#d9c99a;

  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);

  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  --font-card:Georgia,"Times New Roman",serif;
}

.dk{
  --bg:#111;
  --bg2:#0a0a0a;
  --panel:#1c1c1e;
  --border:#2c2c2e;
  --border2:#3a3a3c;
  --text:#f2f2f7;
  --tmid:#aeaeb2;
  --tdim:#636366;
  --togbg:#0a0a0a;
  --togact:#2a1d00;
  --inbg:#0a0a0a;
  --incol:#f0e6c8;
}

.lt{
  --bg:#f2f2f7;
  --bg2:#fff;
  --panel:#fff;
  --border:#d1d1d6;
  --border2:#c7c7cc;
  --text:#1c1c1e;
  --tmid:#3a3a3c;
  --tdim:#8e8e93;
  --togbg:#f2f2f7;
  --togact:#fff8e8;
  --inbg:#fff;
  --incol:#1c1c1e;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  min-height:100vh;
}

.app{
  max-width:1200px;
  margin:0 auto;
  padding:20px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.title{
  color:var(--gold);
  font-size:20px;
  font-weight:700;
}

.subtitle{
  color:var(--tdim);
  font-size:12px;
}

.theme-btn{
  background:var(--panel);
  color:var(--tmid);
  border:1px solid var(--border);
  border-radius:20px;
  padding:8px 14px;
  cursor:pointer;
}

.layout{
  display:grid;
  grid-template-columns:420px 1fr;
  gap:24px;
}

.panel{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:12px;
  padding:16px;
  margin-bottom:14px;
}

.ptitle{
  font-size:11px;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--gold);
  margin-bottom:14px;
  font-weight:700;
}

.field{
  margin-bottom:12px;
}

.field label{
  display:block;
  font-size:11px;
  text-transform:uppercase;
  color:var(--tdim);
  margin-bottom:5px;
}

input[type=text],
textarea{
  width:100%;
  background:var(--inbg);
  border:1px solid var(--border);
  color:var(--incol);
  border-radius:8px;
  padding:10px 12px;
  font-size:15px;
}

textarea{
  min-height:80px;
  resize:vertical;
}

.tg{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.tog{
  background:var(--togbg);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--tdim);
  padding:10px;
  cursor:pointer;
  text-align:center;
}

.tog.on{
  border-color:var(--gold);
  color:var(--gold);
  background:var(--togact);
}

.tog small{
  display:block;
  font-size:10px;
  margin-top:4px;
}

.brow{
  display:flex;
  gap:8px;
  margin-top:12px;
}

.btn{
  flex:1;
  border:none;
  border-radius:10px;
  padding:13px;
  cursor:pointer;
  font-weight:700;
}

.bg{
  background:var(--gold);
  color:#1a0f00;
}

.bo{
  background:transparent;
  border:1px solid var(--border2);
  color:var(--tmid);
}

.bd{
  background:transparent;
  border:1px solid #4a2020;
  color:#aa5555;
}

#previewWrap{
  display:flex;
  justify-content:center;
}

/* CARD */

.card{
  position:relative;
  overflow:hidden;
  background:var(--card-bg,var(--parchment));
  display:flex;
  flex-direction:column;
  font-family:var(--font-card);
}

.card.sb{
  border:3px double #7a6030;
}

.card.sp{
  border:4px solid var(--red);
}

.card.ss{
  border:2px solid #5a4020;
}

.card.sm{
  border:2px solid #666;
}

.ctb,
.cbb{
  height:12px;
  background:
    repeating-linear-gradient(
      90deg,
      var(--ink) 0,
      var(--ink) 4px,
      transparent 4px,
      transparent 8px
    );
  opacity:.15;
}

.card.sp .ctb,
.card.sp .cbb{
  background:var(--red);
  opacity:1;
}

.ch{
  padding:.45rem .75rem .3rem;
  text-align:center;
}

.cera{
  font-size:.38rem;
  letter-spacing:.3em;
  text-transform:uppercase;
  color:var(--red);
}

.cname{
  font-weight:700;
  font-size:1rem;
  color:var(--ink);
}

.cdates{
  font-style:italic;
  font-size:.42rem;
  color:#7a6030;
}

.cdiv{
  display:flex;
  align-items:center;
  gap:.3rem;
  padding:0 .75rem;
  margin:.15rem 0;
}

.cdiv::before,
.cdiv::after{
  content:'';
  flex:1;
  height:1px;
  background:var(--ink);
  opacity:.3;
}

.cia{
  position:relative;
  margin:0 .75rem .3rem;
  flex:1;
  overflow:hidden;
  background:var(--parchment-dark);
  display:flex;
  align-items:center;
  justify-content:center;
}

.cia img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:top center;
}

.sk-none{
  filter:none;
}

.sk-woodcut{
  filter:grayscale(1) contrast(2.4) brightness(1.1) sepia(.15);
}

.sk-etching{
  filter:grayscale(1) contrast(3) brightness(1.25);
}

.sk-pencil{
  filter:grayscale(1) contrast(1.6) brightness(1.35);
}

.sk-litho{
  filter:grayscale(1) contrast(2.8) brightness(.95) sepia(.08);
}

.sk-crosshatch{
  filter:grayscale(1) contrast(3);
}

.crole{
  padding:0 .75rem;
  text-align:center;
  font-style:italic;
  font-size:.44rem;
}

.cbody{
  padding:.3rem .75rem .25rem;
}

.cquote{
  font-style:italic;
  font-size:.44rem;
  line-height:1.5;
  border-left:2px solid #b8941f;
  padding-left:.4rem;
}

.cfoot{
  padding:.2rem .75rem .3rem;
  display:flex;
  justify-content:space-between;
}

.cnat{
  font-size:.32rem;
  text-transform:uppercase;
  color:rgba(0,0,0,.35);
}

.cser{
  font-size:.32rem;
  color:#b8941f;
}

/* SAVED */

.sgrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.sitem{
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:8px;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.sname{
  font-size:12px;
}

.sdel{
  background:none;
  border:none;
  color:#aa5555;
  cursor:pointer;
}

/* MOBILE */

@media(max-width:900px){

  .layout{
    grid-template-columns:1fr;
  }

}

</style>
</head>

<body>

<div class="app">

<div class="topbar">
  <div>
    <div class="title">NFC Cards</div>
    <div class="subtitle">Digital Graffiti Project</div>
  </div>

  <button class="theme-btn" onclick="toggleTheme()">
    <span id="themeIcon">☀️</span>
    <span id="themeText">Light</span>
  </button>
</div>

<div class="layout">

<div>

<div class="panel">

<div class="ptitle">Card Details</div>

<div class="field">
<label>Full Name</label>
<input type="text" id="nm" value="Frederick Douglass" oninput="updatePreview()">
</div>

<div class="field">
<label>Birth – Death Years</label>
<input type="text" id="dt" value="1818 – 1895" oninput="updatePreview()">
</div>

<div class="field">
<label>Role</label>
<input type="text" id="ro" value="Abolitionist · Author · Statesman" oninput="updatePreview()">
</div>

<div class="field">
<label>Nationality</label>
<input type="text" id="na" value="American" oninput="updatePreview()">
</div>

<div class="field">
<label>Era</label>
<input type="text" id="er" value="Antebellum America" oninput="updatePreview()">
</div>

<div class="field">
<label>Quote</label>
<textarea id="qu" oninput="updatePreview()">"Once you learn to read, you will be forever free."</textarea>
</div>

<div class="field">
<label>Series</label>
<input type="text" id="se" value="Voices of Dissent · Vol. I" oninput="updatePreview()">
</div>

<div class="field">
<label>Image URL</label>
<input type="text" id="im"
value="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Frederick_Douglass_%28circa_1879%29.jpg/440px-Frederick_Douglass_%28circa_1879%29.jpg"
oninput="updatePreview()">
</div>

</div>

<div class="panel">

<div class="ptitle">Card Style</div>

<div class="tg">
<button class="tog st-tog on" data-v="broadside" onclick="setStyle('broadside')">Broadside</button>

<button class="tog st-tog" data-v="propaganda" onclick="setStyle('propaganda')">Propaganda</button>

<button class="tog st-tog" data-v="stamp" onclick="setStyle('stamp')">Stamp</button>

<button class="tog st-tog" data-v="monument" onclick="setStyle('monument')">Monument</button>
</div>

</div>

<div class="panel">

<div class="ptitle">Portrait Effect</div>

<div class="tg">

<button class="tog sk-tog" data-v="none"
onclick="setSketch('none')">Photo</button>

<button class="tog sk-tog on" data-v="woodcut"
onclick="setSketch('woodcut')">Woodcut</button>

<button class="tog sk-tog" data-v="etching"
onclick="setSketch('etching')">Etching</button>

<button class="tog sk-tog" data-v="pencil"
onclick="setSketch('pencil')">Pencil</button>

<button class="tog sk-tog" data-v="litho"
onclick="setSketch('litho')">Lithograph</button>

<button class="tog sk-tog" data-v="crosshatch"
onclick="setSketch('crosshatch')">Crosshatch</button>

</div>

</div>

<div class="panel">

<div class="ptitle">Card Background</div>

<div class="tg">

<button class="tog bg-tog on" data-v=""
onclick="setBg('')">Parchment</button>

<button class="tog bg-tog" data-v="#ffffff"
onclick="setBg('#ffffff')">White</button>

<button class="tog bg-tog" data-v="#f5f0e8"
onclick="setBg('#f5f0e8')">Cream</button>

<button class="tog bg-tog" data-v="#1a1a1a"
onclick="setBg('#1a1a1a')">Black</button>

</div>

</div>

<div class="panel">

<div class="ptitle">Saved Cards</div>

<div class="sgrid" id="savedList"></div>

<div class="brow">
<button class="btn bg" onclick="saveCard()">Add Card</button>
<button class="btn bd" onclick="clearCards()">Clear</button>
</div>

</div>

</div>

<div>

<div class="panel">

<div class="ptitle">Live Preview</div>

<div id="previewWrap">
<div id="preview"></div>
</div>

</div>

</div>

</div>

</div>

<script>

let dark=true;

let cStyle='broadside';
let cSketch='woodcut';
let cardBg='';

let cards=[];

function esc(s){
  return String(s||'')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function toggleTheme(){

  dark=!dark;

  const root=document.getElementById('root');

  root.className=dark?'dk':'lt';

  document.getElementById('themeIcon').textContent=
    dark?'☀️':'🌙';

  document.getElementById('themeText').textContent=
    dark?'Light':'Dark';
}

function setStyle(v){

  cStyle=v;

  document.querySelectorAll('.st-tog').forEach(b=>{
    b.classList.toggle('on',b.dataset.v===v);
  });

  updatePreview();
}

function setSketch(v){

  cSketch=v;

  document.querySelectorAll('.sk-tog').forEach(b=>{
    b.classList.toggle('on',b.dataset.v===v);
  });

  updatePreview();
}

function setBg(v){

  cardBg=v;

  document.querySelectorAll('.bg-tog').forEach(b=>{
    b.classList.toggle('on',b.dataset.v===v);
  });

  updatePreview();
}

function getVal(id){

  const e=document.getElementById(id);

  return e?e.value:'';
}

function getData(){

  return{
    name:getVal('nm'),
    dates:getVal('dt'),
    role:getVal('ro'),
    nation:getVal('na'),
    era:getVal('er'),
    quote:getVal('qu'),
    series:getVal('se'),
    img:getVal('im'),
    style:cStyle,
    sketch:cSketch,
    bg:cardBg
  };
}

function buildCard(d){

  let cls='card ';

  if(d.style==='broadside') cls+='sb';
  else if(d.style==='propaganda') cls+='sp';
  else if(d.style==='stamp') cls+='ss';
  else cls+='sm';

  return `
  <div class="${cls}"
    style="${d.bg ? '--card-bg:'+d.bg : ''};
           width:320px;
           height:420px;
           box-shadow:0 8px 32px rgba(0,0,0,.45);">

    <div class="ctb"></div>

    <div class="ch">
      <div class="cera">${esc(d.era)}</div>
      <div class="cname">${esc(d.name)}</div>
      <div class="cdates">${esc(d.dates)}</div>
    </div>

    <div class="cdiv">
      <span>✦</span>
    </div>

    <div class="cia">

      ${
        d.img
        ? `<img
            src="${esc(d.img)}"
            class="sk-${esc(d.sketch)}"
            onerror="this.style.display='none'">`
        : ''
      }

    </div>

    <div class="crole">
      ${esc(d.role)}
    </div>

    <div class="cbody">
      <div class="cquote">
        ${esc(d.quote)}
      </div>
    </div>

    <div class="cfoot">
      <div class="cnat">${esc(d.nation)}</div>
      <div class="cser">${esc(d.series)}</div>
    </div>

    <div class="cbb"></div>

  </div>
  `;
}

function updatePreview(){

  const d=getData();

  document.getElementById('preview').innerHTML=
    buildCard(d);
}

function saveCard(){

  const d=getData();

  cards.push(d);

  renderCards();
}

function renderCards(){

  const wrap=document.getElementById('savedList');

  if(!cards.length){

    wrap.innerHTML='<div>No cards saved</div>';

    return;
  }

  wrap.innerHTML=cards.map((c,i)=>`
    <div class="sitem">

      <div class="sname">
        ${esc(c.name)}
      </div>

      <button class="sdel"
        onclick="deleteCard(${i})">
        ✕
      </button>

    </div>
  `).join('');
}

function deleteCard(i){

  cards.splice(i,1);

  renderCards();
}

function clearCards(){

  cards=[];

  renderCards();
}

updatePreview();

</script>

</body>
</html>

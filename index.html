<!DOCTYPE html>
<html lang="en" class="dk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFC Cards — Digital Graffiti Project</title>
<style>
:root {
  --gold: #c8a020;
  --gold-h: #e0b830;
  --red: #8b1a1a;
  --ink: #1a0f00;
  --parchment: #f0e6c8;
  --parchment-dark: #d9c99a;
  --font: 'Georgia', 'Times New Roman', serif;
  --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  --font-card: Georgia, "Times New Roman", serif;
}

/* DARK THEME */
html.dk {
  --bg: #111;
  --bg2: #0a0a0a;
  --panel: #1c1c1e;
  --border: #2c2c2e;
  --border2: #3a3a3c;
  --text: #f2f2f7;
  --tmid: #aeaeb2;
  --tdim: #636366;
  --togbg: #0a0a0a;
  --togact: #2a1d00;
  --inbg: #0a0a0a;
  --incol: #f0e6c8;
}

/* LIGHT THEME */
html.lt {
  --bg: #f2f2f7;
  --bg2: #fff;
  --panel: #fff;
  --border: #d1d1d6;
  --border2: #c7c7cc;
  --text: #1c1c1e;
  --tmid: #3a3a3c;
  --tdim: #8e8e93;
  --togbg: #f2f2f7;
  --togact: #fff8e8;
  --inbg: #fff;
  --incol: #1c1c1e;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-ui);
  font-size: 14px;
  line-height: 1.4;
  transition: background .2s, color .2s;
}

/* ── TOPBAR ── */
.topbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.topbar-title {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--gold);
}
.topbar-sub {
  font-size: 11px;
  color: var(--tdim);
  margin-top: 2px;
}
.topbar-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* ── LAYOUT ── */
.layout {
  display: grid;
  grid-template-columns: 420px 1fr;
  gap: 24px;
  padding: 24px;
  max-width: 1280px;
  margin: 0 auto;
  align-items: start;
}
.col-left { display: flex; flex-direction: column; gap: 12px; }
.col-right { position: sticky; top: 74px; }

/* ── PANEL ── */
.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px;
}
.ptitle {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* ── FIELDS ── */
.field { margin-bottom: 12px; }
.field:last-child { margin-bottom: 0; }
.field > label {
  display: block;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--tdim);
  margin-bottom: 5px;
}
input[type=text], textarea {
  width: 100%;
  background: var(--inbg);
  border: 1px solid var(--border);
  color: var(--incol);
  font-family: var(--font-ui);
  font-size: 14px;
  padding: 9px 11px;
  border-radius: 8px;
  outline: none;
  appearance: none;
  transition: border-color .15s;
}
input[type=text]:focus, textarea:focus { border-color: var(--gold); }
textarea { min-height: 74px; resize: vertical; line-height: 1.5; }

/* ── TOGGLE GRID ── */
.tg { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.tg3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.tog {
  background: var(--togbg);
  border: 1px solid var(--border);
  color: var(--tdim);
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 500;
  padding: 9px 6px;
  cursor: pointer;
  border-radius: 8px;
  text-align: center;
  line-height: 1.3;
  appearance: none;
  min-height: 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  transition: all .15s;
}
.tog small {
  display: block;
  font-size: 10px;
  color: var(--tdim);
  opacity: .7;
  font-weight: 400;
}
.tog.on {
  border-color: var(--gold);
  color: var(--gold);
  background: var(--togact);
  font-weight: 600;
}
.tog.on small { color: var(--gold); opacity: .8; }

/* ── BUTTONS ── */
.brow { display: flex; gap: 8px; margin-top: 12px; }
.btn {
  flex: 1;
  padding: 11px 10px;
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  border-radius: 10px;
  min-height: 42px;
  appearance: none;
  transition: all .15s;
}
.bg { background: var(--gold); color: #1a0f00; }
.bg:hover { background: var(--gold-h); }
.bo { background: transparent; border: 1px solid var(--border2); color: var(--tmid); }
.bo:hover { border-color: var(--gold); color: var(--gold); }
.bd { background: transparent; border: 1px solid #4a2020; color: #aa5555; }
.bd:hover { border-color: var(--red); color: var(--red); }

/* ── HINT ── */
.hint {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 11px;
  color: var(--tdim);
  line-height: 1.6;
  margin-top: 10px;
}
.hint strong { color: var(--tmid); font-weight: 600; }

/* ── SAVED CARDS LIST ── */
.badge { font-size: 11px; color: var(--tdim); font-weight: 400; }
.sgrid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 12px;
  max-height: 220px;
  overflow-y: auto;
}
.sitem {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 9px 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  transition: border-color .15s;
}
.sitem:hover { border-color: var(--gold); }
.sname { font-size: 12px; font-weight: 500; color: var(--text); }
.sdel {
  background: none;
  border: none;
  color: var(--tdim);
  cursor: pointer;
  font-size: 14px;
  padding: 2px 4px;
  line-height: 1;
}
.sdel:hover { color: var(--red); }
.empty { font-size: 12px; color: var(--tdim); text-align: center; padding: 20px; grid-column: 1/-1; }

/* ── IMAGE UPLOAD ── */
.img-row { display: flex; gap: 8px; align-items: stretch; }
.img-row input[type=text] { flex: 1; }
.upload-btn {
  flex-shrink: 0;
  background: var(--togbg);
  border: 1px solid var(--border);
  color: var(--tmid);
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 500;
  padding: 0 12px;
  border-radius: 8px;
  cursor: pointer;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 5px;
  min-height: 38px;
  transition: all .15s;
}
.upload-btn:hover { border-color: var(--gold); color: var(--gold); }
.upload-btn input[type=file] { display: none; }
.img-thumb {
  width: 100%;
  height: 56px;
  object-fit: cover;
  object-position: top center;
  border-radius: 6px;
  margin-top: 6px;
  border: 1px solid var(--border);
  display: none;
}
.img-thumb.vis { display: block; }

/* ── PREVIEW PANEL ── */
.pmeta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}
.plabel {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--gold);
}
.psize { font-size: 11px; color: var(--tdim); }
#preview-wrap { display: flex; justify-content: center; }

/* ══════════════════════════════
   CARD COMPONENT
   Font-size on .card set to 96px so rem fractions resolve
   (e.g. .44rem → ~42px) matching print dimensions.
   ══════════════════════════════ */
#preview-wrap .card { font-size: 96px; }

.card {
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  font-family: var(--font-card);
}
/* Style variants */
.card.sb { background: var(--card-bg, #f5e8c0); border: 3px double #7a6030; }
.card.sp { background: var(--card-bg, #e8d5b0); border: 4px solid var(--red); }
.card.ss { background: var(--card-bg, #f0e8d0); border: 2px solid #5a4020; }
.card.sm { background: var(--card-bg, #e0d8c8); border: 2px solid #666; }

.ctb {
  height: 14px;
  flex-shrink: 0;
  background: repeating-linear-gradient(90deg, var(--ink) 0, var(--ink) 4px, transparent 4px, transparent 8px);
  opacity: .15;
}
.card.sp .ctb { background: var(--red); opacity: 1; height: 8px; }

.ch { padding: .45rem .75rem .3rem; text-align: center; flex-shrink: 0; }
.cera { font-family: var(--font-ui); font-size: .38rem; letter-spacing: .3em; text-transform: uppercase; color: var(--red); }
.card.sm .cera { color: #555; }
.cname { font-family: var(--font-card); font-weight: 700; font-size: .95rem; line-height: 1.15; color: var(--ink); }
.card.sp .cname { font-weight: 900; font-size: 1.05rem; text-transform: uppercase; color: var(--red); }
.cdates { font-style: italic; font-size: .42rem; color: #7a6030; margin-top: .06rem; }

.cdiv { display: flex; align-items: center; gap: .3rem; padding: 0 .75rem; margin: .15rem 0; flex-shrink: 0; }
.cdiv::before, .cdiv::after { content: ''; flex: 1; height: 1px; background: var(--ink); opacity: .3; }
.corn { font-size: .5rem; color: #b8941f; opacity: .8; }
.card.sp .cdiv::before, .card.sp .cdiv::after { background: var(--red); opacity: .6; }

.cia {
  margin: 0 .75rem .3rem;
  flex: 1 1 auto;
  min-height: 0;
  background: var(--parchment-dark);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.card.ss .cia { border: 5px solid white; box-shadow: 0 0 0 1px #ccc, inset 0 0 0 1px #ccc; }
.card.sm .cia { border: 2px solid #aaa; background: #d8d0c0; }

.cia img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top center;
}
.cia img.sk-none    { filter: sepia(.4) contrast(1.1); }
.cia img.sk-woodcut { filter: grayscale(1) contrast(2.4) brightness(1.1) sepia(.15); mix-blend-mode: multiply; }
.cia img.sk-etching { filter: grayscale(1) contrast(3) brightness(1.25); mix-blend-mode: multiply; }
.cia img.sk-pencil  { filter: grayscale(1) contrast(1.6) brightness(1.35); mix-blend-mode: multiply; opacity: .85; }
.cia img.sk-litho   { filter: grayscale(1) contrast(2.8) brightness(.95) sepia(.08); mix-blend-mode: multiply; }
.cia img.sk-crosshatch { display: none; }
.cia canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

.cph {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: .3rem;
  opacity: .35;
}
.cph svg { width: 36px; height: 36px; }
.cph span { font-family: var(--font-ui); font-size: .38rem; letter-spacing: .15em; text-transform: uppercase; }

.crole { padding: 0 .75rem; text-align: center; font-style: italic; font-size: .44rem; color: #5a4020; line-height: 1.3; flex-shrink: 0; }
.card.sp .crole { font-style: normal; font-weight: 700; font-size: .42rem; letter-spacing: .06em; color: #333; }

.cbody { padding: .3rem .75rem .25rem; display: flex; justify-content: space-between; align-items: flex-end; gap: .4rem; flex-shrink: 0; }
.cquote { font-style: italic; font-size: .44rem; line-height: 1.5; color: #2a1800; border-left: 2px solid #b8941f; padding-left: .4rem; flex: 1; }
.card.sb .cquote { font-size: .46rem; border-left: none; text-align: center; padding: .2rem .3rem; border-top: 1px solid rgba(0,0,0,.2); border-bottom: 1px solid rgba(0,0,0,.2); }
.card.sp .cquote { font-style: normal; font-weight: 700; font-size: .48rem; border-left: 3px solid var(--red); color: #1a0000; }

.cnfc {
  border: 1px dashed rgba(0,0,0,.2);
  border-radius: 50%;
  width: .55in;
  height: .55in;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,.3);
  position: relative;
  flex-shrink: 0;
}
.cnfc::after {
  content: 'NFC';
  font-family: var(--font-ui);
  font-size: .26rem;
  letter-spacing: .12em;
  color: rgba(0,0,0,.3);
  position: absolute;
  bottom: .1rem;
}
.nw { display: flex; gap: 2px; align-items: flex-end; margin-bottom: .08rem; }
.nb { width: 2px; background: rgba(0,0,0,.2); border-radius: 1px; }

.cfoot { padding: .2rem .75rem .3rem; display: flex; justify-content: space-between; align-items: flex-end; flex-shrink: 0; }
.cnat { font-family: var(--font-ui); font-size: .32rem; letter-spacing: .1em; text-transform: uppercase; color: rgba(0,0,0,.35); }
.cser { font-size: .32rem; letter-spacing: .08em; color: #b8941f; opacity: .75; }

.cbb {
  height: 10px;
  flex-shrink: 0;
  background: repeating-linear-gradient(90deg, var(--ink) 0, var(--ink) 4px, transparent 4px, transparent 8px);
  opacity: .15;
}
.card.sp .cbb { background: var(--red); opacity: 1; height: 6px; }

/* paper texture overlay */
.card::before {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 10;
  opacity: .35;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
}

/* ── PRINT ── */
.psheet { display: none; }
@media print {
  *, *::before, *::after { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  body { background: white; margin: 0; padding: 0; }
  .app { display: none !important; }
  .psheet { display: block !important; }
  .ppage { width: 8.5in; height: 11in; position: relative; page-break-after: always; overflow: hidden; background: white; }
  .lcell { position: absolute; overflow: hidden; }
  .lcell .card { width: 100% !important; height: 100% !important; box-shadow: none !important; margin: 0 !important; font-size: 96px !important; }
  .lcell .card::before { display: none; }
  .psheet.fr .lcell { border-radius: 50%; }
  .psheet.fr .lcell .card { border-radius: 50%; border: none !important; }
}
</style>
</head>
<body>

<script>
var cards = [];
var cStyle = 'broadside';
var cSketch = 'woodcut';
var cFmt = '3x4';
var isDark = true;
var cardBg = '';
var imgData = '';

var FMTS = {
  '4x6':   { w:4,    h:6,  cols:2, rows:3, mT:.5,  mL:.19, gX:.19, gY:0,   per:6,  av:'Avery 8164',  ht:'Large format — portrait pops. Walls, doors, boards.' },
  '3x4':   { w:3.33, h:4,  cols:2, rows:3, mT:.5,  mL:.19, gX:.19, gY:0,   per:6,  av:'Avery 5164',  ht:'Sweet spot — readable anywhere. 6 per sheet.' },
  '2x4':   { w:4,    h:2,  cols:2, rows:5, mT:.5,  mL:.19, gX:.19, gY:0,   per:10, av:'Avery 5163',  ht:'Subtle, cheap — 10 per sheet. Good inside books.' },
  'letter':{ w:7.5,  h:10, cols:1, rows:1, mT:.5,  mL:.5,  gX:0,   gY:0,   per:1,  av:'Full page',   ht:'One poster-card per page. Full-page label stock.' },
  'round': { w:3,    h:3,  cols:3, rows:3, mT:.69, mL:.75, gX:.63, gY:.25, per:9,  av:'Avery 22807', ht:'Circular medallion. Unusual shape draws attention.' },
  'card':  { w:3.5,  h:5,  cols:2, rows:2, mT:.5,  mL:.75, gX:.5,  gY:.25, per:4,  av:'Index card',  ht:'Trading card size. Print on cardstock, cut apart.' }
};

function setTheme(dark) {
  isDark = dark;
  document.documentElement.className = dark ? 'dk' : 'lt';
  var icon  = document.getElementById('ticon');
  var label = document.getElementById('tlabel');
  if (icon)  icon.textContent  = dark ? '☀️' : '🌙';
  if (label) label.textContent = dark ? 'Light' : 'Dark';
}

function toggleTheme() { setTheme(!isDark); }

function setSketch(v) {
  cSketch = v;
  document.querySelectorAll('.sk-tog').forEach(function(b) {
    b.classList.toggle('on', b.getAttribute('data-v') === v);
  });
  updatePreview();
}

function setStyle(v) {
  cStyle = v;
  document.querySelectorAll('.st-tog').forEach(function(b) {
    b.classList.toggle('on', b.getAttribute('data-v') === v);
  });
  updatePreview();
}

function setFmt(v) {
  cFmt = v;
  document.querySelectorAll('.fm-tog').forEach(function(b) {
    b.classList.toggle('on', b.getAttribute('data-v') === v);
  });
  buildPrintSheet();
  updatePreview();
}

function setBg(v) {
  cardBg = v;
  document.querySelectorAll('.bg-tog').forEach(function(b) {
    b.classList.toggle('on', b.getAttribute('data-v') === v);
  });
  updatePreview();
}

/* ── Crosshatch canvas renderer ── */
function drawCrosshatch(img, canvas) {
  var W = canvas.width, H = canvas.height;
  var ctx = canvas.getContext('2d');
  var off = document.createElement('canvas');
  off.width = W; off.height = H;
  var octx = off.getContext('2d');
  octx.drawImage(img, 0, 0, W, H);
  var data = octx.getImageData(0, 0, W, H).data;

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);

  var spacing = 4;
  ctx.strokeStyle = '#111111';
  ctx.lineWidth = 0.8;
  ctx.lineCap = 'round';

  function getLum(x, y) {
    x = Math.max(0, Math.min(W-1, Math.round(x)));
    y = Math.max(0, Math.min(H-1, Math.round(y)));
    var i = (y * W + x) * 4;
    return 1 - (0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2]) / 255;
  }

  ctx.beginPath();
  for (var d = -H; d < W+H; d += spacing) {
    var steps = Math.max(W,H)/spacing|0;
    var drawing = false;
    for (var s = 0; s <= steps; s++) {
      var t = s/steps;
      var px = d + (d+H-d)*t, py = H*t;
      var lum = getLum(px, py);
      if (lum > 0.22) { if (!drawing) { ctx.moveTo(px,py); drawing=true; } else ctx.lineTo(px,py); }
      else drawing = false;
    }
  }
  ctx.stroke();

  ctx.beginPath();
  ctx.lineWidth = 0.7;
  for (var d2 = -H; d2 < W+H; d2 += spacing) {
    var steps2 = Math.max(W,H)/spacing|0;
    var drawing2 = false;
    for (var s2 = 0; s2 <= steps2; s2++) {
      var t2 = s2/steps2;
      var px2 = (d2+H) + (d2-(d2+H))*t2, py2 = H*t2;
      var lum2 = getLum(px2, py2);
      if (lum2 > 0.45) { if (!drawing2) { ctx.moveTo(px2,py2); drawing2=true; } else ctx.lineTo(px2,py2); }
      else drawing2 = false;
    }
  }
  ctx.stroke();

  ctx.beginPath();
  ctx.lineWidth = 0.6;
  for (var y = 0; y < H; y += spacing) {
    var drawing3 = false;
    for (var x = 0; x < W; x += 2) {
      var lum3 = getLum(x, y);
      if (lum3 > 0.68) { if (!drawing3) { ctx.moveTo(x,y); drawing3=true; } else ctx.lineTo(x,y); }
      else drawing3 = false;
    }
  }
  ctx.stroke();
}

function applyCanvasSketch(container) {
  var img = container.querySelector('img.sk-crosshatch');
  if (!img) return;
  var existing = container.querySelector('canvas');
  if (existing) existing.remove();
  var canvas = document.createElement('canvas');
  canvas.width = 300; canvas.height = 360;
  container.style.position = 'relative';
  container.appendChild(canvas);
  if (img.complete && img.naturalWidth > 0) drawCrosshatch(img, canvas);
  else img.onload = function() { drawCrosshatch(img, canvas); };
}

function getVal(id) {
  var e = document.getElementById(id);
  return e ? e.value : '';
}

function handleUpload(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    imgData = e.target.result;
    var thumb = document.getElementById('thumb');
    if (thumb) { thumb.src = imgData; thumb.classList.add('vis'); }
    var urlEl = document.getElementById('f-img');
    if (urlEl) urlEl.value = '';
    updatePreview();
  };
  reader.readAsDataURL(file);
}

function clearUpload() {
  imgData = '';
  var thumb = document.getElementById('thumb');
  if (thumb) { thumb.src = ''; thumb.classList.remove('vis'); }
  updatePreview();
}

function getData() {
  var imgSrc = imgData || getVal('f-img');
  return {
    name:   getVal('f-name'),
    dates:  getVal('f-dates'),
    role:   getVal('f-role'),
    nation: getVal('f-nation'),
    era:    getVal('f-era'),
    quote:  getVal('f-quote'),
    url:    getVal('f-url'),
    series: getVal('f-series'),
    img:    imgSrc,
    imgIsUpload: !!imgData,
    style:  cStyle,
    sketch: cSketch,
    fmt:    cFmt,
    bg:     cardBg
  };
}

function buildCard(d) {
  var sc = 'card ';
  if      (d.style === 'broadside')   sc += 'sb';
  else if (d.style === 'propaganda')  sc += 'sp';
  else if (d.style === 'stamp')       sc += 'ss';
  else                                sc += 'sm';

  var sk = 'sk-' + (d.sketch || 'woodcut');

  var img = d.img
    ? '<img src="' + d.img + '" class="' + sk + '" crossorigin="anonymous" onerror="this.style.display=\'none\'">'
    : '<div class="cph"><svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="8" y="8" width="48" height="48" rx="2"/><circle cx="32" cy="26" r="10"/><path d="M8 56 Q32 38 56 56"/></svg><span>Portrait</span></div>';

  var bgAttr = d.bg ? ' style="--card-bg:' + d.bg + '"' : '';

  return '<div class="' + sc + '"' + bgAttr + '>'
    + '<div class="ctb"></div>'
    + '<div class="ch">'
    +   '<div class="cera">'  + (d.era  || '') + '</div>'
    +   '<div class="cname">' + (d.name || 'Unknown') + '</div>'
    +   '<div class="cdates">' + (d.dates || '') + '</div>'
    + '</div>'
    + '<div class="cdiv"><span class="corn">&#x2736;</span></div>'
    + '<div class="cia">' + img + '</div>'
    + '<div class="crole">' + (d.role || '') + '</div>'
    + '<div class="cbody">'
    +   '<div class="cquote">' + (d.quote || '') + '</div>'
    +   '<div class="cnfc">'
    +     '<div class="nw">'
    +       '<div class="nb" style="height:5px"></div>'
    +       '<div class="nb" style="height:8px"></div>'
    +       '<div class="nb" style="height:11px"></div>'
    +       '<div class="nb" style="height:8px"></div>'
    +       '<div class="nb" style="height:5px"></div>'
    +     '</div>'
    +   '</div>'
    + '</div>'
    + '<div class="cfoot">'
    +   '<div class="cnat">' + (d.nation || '') + '</div>'
    +   '<div class="cser">' + (d.series || '') + '</div>'
    + '</div>'
    + '<div class="cbb"></div>'
    + '</div>';
}

function updatePreview() {
  var d = getData();
  var fmt = FMTS[cFmt];
  var maxW = 480;
  var scale = Math.min(1, maxW / (fmt.w * 96));
  var pw = Math.round(fmt.w * 96 * scale);
  var ph = Math.round(fmt.h * 96 * scale);

  var wrap = document.getElementById('preview-wrap');
  if (!wrap) return;
  wrap.innerHTML = buildCard(d);

  var card = wrap.querySelector('.card');
  if (card) {
    card.style.width  = pw + 'px';
    card.style.height = ph + 'px';
    card.style.boxShadow = '0 8px 40px rgba(0,0,0,.55)';
    if (d.bg) card.style.setProperty('--card-bg', d.bg);
    if (cSketch === 'crosshatch') {
      var cia = card.querySelector('.cia');
      if (cia) setTimeout(function() { applyCanvasSketch(cia); }, 50);
    }
  }

  var badge = fmt.w + '\u2033 \xd7 ' + fmt.h + '\u2033 \xb7 ' + fmt.av;
  var hint  = '<strong>' + fmt.av + '</strong> &mdash; ' + fmt.ht + ' <strong>' + fmt.per + ' per sheet.</strong>';
  var psz   = document.getElementById('psz');
  var lhint = document.getElementById('lhint');
  if (psz)   psz.textContent = badge;
  if (lhint) lhint.innerHTML = hint;
}

function buildPrintSheet() {
  var fmt   = FMTS[cFmt];
  var sheet = document.getElementById('psh');
  sheet.className = 'psheet' + (cFmt === 'round' ? ' fr' : '');
  if (!cards.length) { sheet.innerHTML = ''; return; }
  var pages = Math.ceil(cards.length / fmt.per);
  var html  = '';
  for (var p = 0; p < pages; p++) {
    var batch = cards.slice(p * fmt.per, (p + 1) * fmt.per);
    var cells = '';
    for (var i = 0; i < batch.length; i++) {
      var col  = i % fmt.cols;
      var row  = Math.floor(i / fmt.cols);
      var left = fmt.mL + col * (fmt.w + fmt.gX);
      var top  = fmt.mT + row * (fmt.h + fmt.gY);
      cells += '<div class="lcell" style="left:' + left + 'in;top:' + top + 'in;width:' + fmt.w + 'in;height:' + fmt.h + 'in;">' + buildCard(batch[i]) + '</div>';
    }
    html += '<div class="ppage">' + cells + '</div>';
  }
  sheet.innerHTML = html;
}

function saveCard() {
  var d = getData();
  if (!d.name) return;
  cards.push(d);
  renderList();
  buildPrintSheet();
}

function delCard(i) { cards.splice(i, 1); renderList(); buildPrintSheet(); }
function clearAll()  { cards = []; renderList(); buildPrintSheet(); }

function loadCard(i) {
  var d = cards[i];
  var map = { name:'f-name', dates:'f-dates', role:'f-role', nation:'f-nation', era:'f-era', quote:'f-quote', url:'f-url', series:'f-series' };
  Object.keys(map).forEach(function(k) {
    var el = document.getElementById(map[k]);
    if (el) el.value = d[k] || '';
  });
  if (d.imgIsUpload && d.img) {
    imgData = d.img;
    var imgEl = document.getElementById('f-img');
    if (imgEl) imgEl.value = '';
    var thumb = document.getElementById('thumb');
    if (thumb) { thumb.src = d.img; thumb.classList.add('vis'); }
  } else {
    imgData = '';
    var imgEl2 = document.getElementById('f-img');
    if (imgEl2) imgEl2.value = d.img || '';
    var thumb2 = document.getElementById('thumb');
    if (thumb2) { thumb2.src = ''; thumb2.classList.remove('vis'); }
  }
  cStyle  = d.style;
  cSketch = d.sketch || 'woodcut';
  cFmt    = d.fmt    || '3x4';
  cardBg  = d.bg     || '';
  document.querySelectorAll('.sk-tog').forEach(function(b) { b.classList.toggle('on', b.getAttribute('data-v') === cSketch); });
  document.querySelectorAll('.st-tog').forEach(function(b) { b.classList.toggle('on', b.getAttribute('data-v') === cStyle); });
  document.querySelectorAll('.fm-tog').forEach(function(b) { b.classList.toggle('on', b.getAttribute('data-v') === cFmt); });
  document.querySelectorAll('.bg-tog').forEach(function(b) { b.classList.toggle('on', b.getAttribute('data-v') === cardBg); });
  updatePreview();
}

function renderList() {
  var count = '(' + cards.length + ' card' + (cards.length !== 1 ? 's' : '') + ')';
  var cc = document.getElementById('cc');
  if (cc) cc.textContent = count;
  var inner = cards.length
    ? cards.map(function(c, i) {
        return '<div class="sitem" onclick="loadCard(' + i + ')">'
             + '<span class="sname">' + c.name + '</span>'
             + '<button class="sdel" onclick="event.stopPropagation();delCard(' + i + ')">&#x2715;</button>'
             + '</div>';
      }).join('')
    : '<div class="empty">No cards added yet</div>';
  var sl = document.getElementById('sl');
  if (sl) sl.innerHTML = inner;
}
</script>

<div class="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div>
      <div class="topbar-title">NFC Cards</div>
      <div class="topbar-sub">Digital Graffiti Project</div>
    </div>
    <div class="topbar-right">
      <button class="btn bo" style="flex:0;min-width:96px;padding:8px 14px;font-size:13px;" onclick="toggleTheme()">
        <span id="ticon">☀️</span>&nbsp;<span id="tlabel">Light</span>
      </button>
      <button class="btn bg" style="flex:0;min-width:96px;padding:8px 14px;font-size:13px;" onclick="window.print()">⎙ Print</button>
    </div>
  </div>

  <!-- DESKTOP LAYOUT -->
  <div class="layout">

    <!-- LEFT COLUMN: EDITOR -->
    <div class="col-left">

      <!-- Card Details -->
      <div class="panel">
        <div class="ptitle">Card Details</div>
        <div class="field"><label>Full Name</label>
          <input type="text" id="f-name" placeholder="Frederick Douglass" value="Frederick Douglass" oninput="updatePreview()">
        </div>
        <div class="field"><label>Birth – Death Years</label>
          <input type="text" id="f-dates" placeholder="1818 – 1895" value="1818 – 1895" oninput="updatePreview()">
        </div>
        <div class="field"><label>Title / Role</label>
          <input type="text" id="f-role" placeholder="Abolitionist · Author · Statesman" value="Abolitionist · Author · Statesman" oninput="updatePreview()">
        </div>
        <div class="field"><label>Nationality / Origin</label>
          <input type="text" id="f-nation" placeholder="American" value="American" oninput="updatePreview()">
        </div>
        <div class="field"><label>Era / Period</label>
          <input type="text" id="f-era" placeholder="Antebellum America" value="Antebellum America" oninput="updatePreview()">
        </div>
        <div class="field"><label>Quote / Excerpt</label>
          <textarea id="f-quote" oninput="updatePreview()">"Once you learn to read, you will be forever free."</textarea>
        </div>
        <div class="field"><label>NFC URL</label>
          <input type="text" id="f-url" placeholder="https://..." oninput="updatePreview()">
        </div>
        <div class="field"><label>Series Name</label>
          <input type="text" id="f-series" placeholder="Voices of Dissent · Vol. I" value="Voices of Dissent · Vol. I" oninput="updatePreview()">
        </div>
        <div class="field"><label>Portrait Image</label>
          <div class="img-row">
            <input type="text" id="f-img" placeholder="https://upload.wikimedia.org/…" oninput="imgData=''; updatePreview()">
            <label class="upload-btn">📷 Upload<input type="file" accept="image/*" onchange="handleUpload(this)"></label>
          </div>
          <img id="thumb" class="img-thumb" alt="">
        </div>
      </div>

      <!-- Card Background -->
      <div class="panel">
        <div class="ptitle">Card Background</div>
        <div class="tg">
          <button class="tog bg-tog on" data-v=""        onclick="setBg('')">Parchment<small>Default</small></button>
          <button class="tog bg-tog"    data-v="#ffffff"  onclick="setBg('#ffffff')">White<small>Save ink</small></button>
          <button class="tog bg-tog"    data-v="#f5f0e8"  onclick="setBg('#f5f0e8')">Cream<small>Soft</small></button>
          <button class="tog bg-tog"    data-v="#1a1a1a"  onclick="setBg('#1a1a1a')">Black<small>Bold</small></button>
        </div>
      </div>

      <!-- Portrait Effect -->
      <div class="panel">
        <div class="ptitle">Portrait Effect</div>
        <div class="tg">
          <button class="tog sk-tog"    data-v="none"       onclick="setSketch('none')">Photo</button>
          <button class="tog sk-tog on" data-v="woodcut"    onclick="setSketch('woodcut')">Woodcut</button>
          <button class="tog sk-tog"    data-v="etching"    onclick="setSketch('etching')">Etching</button>
          <button class="tog sk-tog"    data-v="pencil"     onclick="setSketch('pencil')">Pencil</button>
          <button class="tog sk-tog"    data-v="litho"      onclick="setSketch('litho')">Litho</button>
          <button class="tog sk-tog"    data-v="crosshatch" onclick="setSketch('crosshatch')">✏️ Crosshatch<small>Ink sketch</small></button>
        </div>
      </div>

      <!-- Card Style -->
      <div class="panel">
        <div class="ptitle">Card Style</div>
        <div class="tg">
          <button class="tog st-tog on" data-v="broadside"  onclick="setStyle('broadside')">Broadside</button>
          <button class="tog st-tog"    data-v="propaganda" onclick="setStyle('propaganda')">Propaganda</button>
          <button class="tog st-tog"    data-v="stamp"      onclick="setStyle('stamp')">Postage Stamp</button>
          <button class="tog st-tog"    data-v="monument"   onclick="setStyle('monument')">Monument</button>
        </div>
      </div>

      <!-- Label Format -->
      <div class="panel">
        <div class="ptitle">Label Format</div>
        <div class="tg">
          <button class="tog fm-tog"    data-v="4x6"    onclick="setFmt('4x6')">4″ × 6″<small>Avery 8164 · 2-up</small></button>
          <button class="tog fm-tog on" data-v="3x4"    onclick="setFmt('3x4')">3.33″ × 4″<small>Avery 5164 · 6-up</small></button>
          <button class="tog fm-tog"    data-v="2x4"    onclick="setFmt('2x4')">2″ × 4″<small>Avery 5163 · 10-up</small></button>
          <button class="tog fm-tog"    data-v="letter" onclick="setFmt('letter')">Full Page<small>8.5″ × 11″ · 1-up</small></button>
          <button class="tog fm-tog"    data-v="round"  onclick="setFmt('round')">3″ Round<small>Avery 22807 · 6-up</small></button>
          <button class="tog fm-tog"    data-v="card"   onclick="setFmt('card')">3.5″ × 5″<small>Index card · 4-up</small></button>
        </div>
        <div class="hint" id="lhint"></div>
      </div>

      <!-- Actions -->
      <div class="brow">
        <button class="btn bg" onclick="saveCard()">＋ Add to Sheet</button>
      </div>

      <!-- Print Sheet / Saved Cards -->
      <div class="panel">
        <div class="ptitle">Print Sheet <span class="badge" id="cc">(0 cards)</span></div>
        <div class="sgrid" id="sl"><div class="empty">No cards added yet</div></div>
        <div class="brow" style="margin-top:12px;">
          <button class="btn bd" onclick="clearAll()">&#x2715; Clear All</button>
        </div>
      </div>

    </div><!-- /col-left -->

    <!-- RIGHT COLUMN: PREVIEW -->
    <div class="col-right">
      <div class="panel">
        <div class="pmeta">
          <div class="plabel">Live Preview</div>
          <div class="psize" id="psz"></div>
        </div>
        <div id="preview-wrap"></div>
      </div>
    </div>

  </div><!-- /layout -->

</div><!-- /app -->

<div class="psheet" id="psh"></div>

<script>
setTheme(true);
updatePreview();
</script>

</body>
</html>
